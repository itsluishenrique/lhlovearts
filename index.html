<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LH LoveArts</title>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  background:#000;
  font-family:sans-serif;
}

/* CONTAINER FULL SCREEN */
.container {
  position:relative;
  width:100%;
  height:100vh;
  overflow:hidden;
}

/* IMAGEM RESPONSIVA */
.container img {
  width:100%;
  height:100%;
  object-fit:cover; /* preenche sem distorcer */
  object-position:center;
}

/* BOTÃO */
.btn {
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 28px;
  border-radius:30px;
  background: linear-gradient(45deg,#FF4D6D,#D4AF37);
  color:#fff;
  text-decoration:none;
  font-weight:bold;
  font-size:16px;
}

/* 📱 MOBILE AJUSTE */
@media (max-width: 768px) {
  .btn {
    bottom:25px;
    font-size:14px;
    padding:12px 22px;
  }
}

/* 📲 TABLET AJUSTE */
@media (min-width: 769px) and (max-width: 1024px) {
  .btn {
    bottom:30px;
  }
}

/* 💻 DESKTOP */
@media (min-width: 1025px) {
  .container img {
    object-fit: contain; /* evita distorção */
    background:#000;
  }
}
</style>
</head>

<body>

<div class="container">
  <img src="lhlovearts.png" alt="LH LoveArts">
</div>

</body>
</html>
