name: Deploy LH Love Arts

on:
  push:
    branches:
      - main
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Azure
    steps:
      # Checkout do código
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
          
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROUD_SMOKE_047022E0F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./"
          api_location: ""
          output_location: "./"