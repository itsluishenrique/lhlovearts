<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LH LoveArts | Em Breve</title>

<link rel="icon" href="assets/images/icon/favicon.ico" type="image/x-icon" />

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  background:#000;
  font-family:sans-serif;
}

/* CONTAINER FULL SCREEN */
.container {
  position:relative;
  width:100%;
  min-height:100vh; /* melhor que height fixa */
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* IMAGEM RESPONSIVA */
.container img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* MOBILE */
@media (max-width: 600px) {
  .container {
    min-height:100dvh;
    background-image: url("lh-love-arts-mobile.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .container img {
    display:none;
  }
}

/* TABLET */
@media (min-width: 601px) and (max-width: 1024px) {
  .container {
    background-image: url("lh-love-arts-tablet.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .container img {
    display:none;
  }
}

/* 💻 DESKTOP */
@media (min-width: 1025px) {
  .container {
    background-size: contain;
    background-color:#000;
  }
}
</style>
</head>

<body>

<div class="container">
  <img src="lh-love-arts-desktop.png" alt="LH Love Arts">
</div>

</body>
</html>
